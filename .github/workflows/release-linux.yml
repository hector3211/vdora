name: Release Linux Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-4-dev libadwaita-1-dev libdbus-1-dev clang cmake libclang-dev pkg-config

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build tar.gz artifact
        run: mkdir -p dist && cp target/release/vdora dist/vdora && tar -C dist -czf dist/vdora-linux-x86_64.tar.gz vdora

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: cargo deb --no-build --output dist/vdora-linux-amd64.deb

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vdora-linux-artifacts
          path: dist/*

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vdora-linux-x86_64.tar.gz
            dist/vdora-linux-amd64.deb
